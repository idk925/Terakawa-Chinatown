<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Terakawa — Loyalty</title>
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
/* === VARIABLES & RESET === */
:root {
  --charcoal: #1a1a1a;
  --charcoal-light: #2a2a2a;
  --charcoal-mid: #222222;
  --cream: #f5f0e8;
  --cream-dim: #e8e0d4;
  --gold: #d4a847;
  --gold-dim: #b8923d;
  --gold-glow: rgba(212,168,71,0.12);
  --red: #c41e3a;
  --red-glow: rgba(196,30,58,0.15);
  --bone: #c8bfb0;
  --bone-dim: #9e9690;
  --green: #6abf69;
  --font-display: 'Cormorant Garamond', serif;
  --font-body: 'DM Sans', sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --nav-height: 64px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height:100%; overflow:hidden;
  background: var(--charcoal); color: var(--cream);
  font-family: var(--font-body); font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}
button { font-family: inherit; border: none; cursor: pointer; background: none; color: inherit; }
input, select { font-family: inherit; }
a { color: inherit; text-decoration: none; }

/* === SCREEN MANAGEMENT === */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s ease, transform 0.35s ease;
  transform: translateY(12px);
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
.screen.active {
  opacity: 1; pointer-events: auto;
  transform: translateY(0);
}
.screen.with-nav { padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 8px); }

/* === WELCOME SCREEN === */
.welcome {
  align-items: center; justify-content: center;
  text-align: center; padding: 40px 32px;
  background: var(--charcoal);
  position: relative;
}
.welcome::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 0%, rgba(212,168,71,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 80% 40% at 50% 100%, rgba(196,30,58,0.04) 0%, transparent 60%);
  pointer-events: none;
}
.welcome-content { position: relative; z-index: 1; }
.welcome-kanji {
  font-family: var(--font-display); font-size: 14px; font-weight: 400;
  letter-spacing: 6px; color: var(--bone-dim); margin-bottom: 24px;
  text-transform: uppercase;
}
.welcome-logo {
  font-family: var(--font-display); font-size: 48px; font-weight: 300;
  letter-spacing: 2px; line-height: 1.1; margin-bottom: 4px;
  color: var(--cream);
}
.welcome-sub {
  font-family: var(--font-display); font-size: 18px; font-weight: 300;
  font-style: italic; color: var(--gold); margin-bottom: 8px;
}
.welcome-tagline {
  font-size: 12px; color: var(--bone-dim); letter-spacing: 3px;
  text-transform: uppercase; margin-bottom: 48px;
}
.welcome-divider {
  width: 40px; height: 1px; background: var(--gold);
  margin: 0 auto 48px; opacity: 0.5;
}
.welcome-buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 300px; }
.btn-primary {
  padding: 16px 32px; border-radius: 12px;
  background: var(--gold); color: var(--charcoal);
  font-size: 14px; font-weight: 600; letter-spacing: 0.5px;
  transition: all 0.2s;
}
.btn-primary:active { transform: scale(0.97); background: var(--gold-dim); }
.btn-secondary {
  padding: 16px 32px; border-radius: 12px;
  background: transparent; color: var(--cream);
  font-size: 14px; font-weight: 500; letter-spacing: 0.5px;
  border: 1px solid rgba(255,255,255,0.12);
  transition: all 0.2s;
}
.btn-secondary:active { transform: scale(0.97); background: rgba(255,255,255,0.04); }

/* === AUTH SCREENS === */
.auth-screen { padding: 0 24px; padding-top: 60px; }
.auth-back {
  position: absolute; top: 16px; left: 16px;
  padding: 12px; font-size: 13px; color: var(--bone);
  display: flex; align-items: center; gap: 6px; z-index: 5;
}
.auth-back svg { width: 18px; height: 18px; }
.auth-header {
  text-align: center; margin-bottom: 36px;
}
.auth-header h1 {
  font-family: var(--font-display); font-size: 32px; font-weight: 300;
  margin-bottom: 6px;
}
.auth-header p { font-size: 13px; color: var(--bone-dim); }

.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-size: 11px; text-transform: uppercase;
  letter-spacing: 2px; color: var(--bone-dim); margin-bottom: 8px;
}
.form-input {
  width: 100%; padding: 14px 16px; border-radius: 10px;
  background: var(--charcoal-light); border: 1px solid rgba(255,255,255,0.08);
  color: var(--cream); font-size: 15px; outline: none;
  transition: border-color 0.2s;
}
.form-input::placeholder { color: var(--bone-dim); opacity: 0.5; }
.form-input:focus { border-color: var(--gold); }

.toggle-method {
  display: flex; border-radius: 10px; overflow: hidden;
  background: var(--charcoal-light); margin-bottom: 20px;
  border: 1px solid rgba(255,255,255,0.06);
}
.toggle-method button {
  flex: 1; padding: 11px; font-size: 13px; font-weight: 500;
  color: var(--bone-dim); transition: all 0.25s;
}
.toggle-method button.active {
  background: var(--gold-glow); color: var(--gold);
}

.bday-row { display: flex; gap: 10px; }
.bday-row select {
  flex: 1; padding: 14px 12px; border-radius: 10px;
  background: var(--charcoal-light); border: 1px solid rgba(255,255,255,0.08);
  color: var(--cream); font-size: 14px; outline: none;
  -webkit-appearance: none; appearance: none;
}
.bday-row select option { background: var(--charcoal-light); }

.auth-form { max-width: 380px; margin: 0 auto; }
.auth-submit {
  width: 100%; padding: 16px; border-radius: 12px;
  background: var(--gold); color: var(--charcoal);
  font-size: 15px; font-weight: 600; margin-top: 8px;
  transition: all 0.2s;
}
.auth-submit:active { transform: scale(0.97); }
.auth-submit:disabled { opacity: 0.4; cursor: not-allowed; }

.auth-switch {
  text-align: center; margin-top: 24px; font-size: 13px; color: var(--bone-dim);
}
.auth-switch a { color: var(--gold); font-weight: 500; }

.form-error {
  text-align: center; padding: 10px; margin-bottom: 12px;
  border-radius: 8px; background: var(--red-glow);
  color: var(--red); font-size: 13px;
  display: none;
}
.form-error.show { display: block; }

/* === DASHBOARD === */
.dash-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.dash-header {
  padding: 24px 24px 0;
  display: flex; justify-content: space-between; align-items: flex-start;
}
.dash-greeting { font-size: 13px; color: var(--bone-dim); margin-bottom: 2px; }
.dash-name {
  font-family: var(--font-display); font-size: 28px; font-weight: 400;
}
.dash-bday-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 12px; border-radius: 20px;
  background: var(--red-glow); color: var(--red);
  font-size: 11px; font-weight: 600;
}

/* Points Hero */
.points-hero {
  margin: 24px 20px; padding: 28px 24px;
  border-radius: 20px; text-align: center; position: relative;
  overflow: hidden;
  background: var(--charcoal-light);
  border: 1px solid rgba(255,255,255,0.06);
}
.points-hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 100% 80% at 50% -20%, var(--gold-glow) 0%, transparent 70%);
  pointer-events: none;
}
.points-hero .tier-label {
  display: inline-block; padding: 4px 16px; border-radius: 20px;
  font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 12px; position: relative;
}
.tier-bronze { background: rgba(180,140,100,0.15); color: #c4a37a; }
.tier-silver { background: rgba(180,180,190,0.15); color: #b8bcc8; }
.tier-gold { background: rgba(212,168,71,0.18); color: var(--gold); }
.tier-platinum { background: rgba(200,200,220,0.15); color: #ddd8f0; }

.points-number {
  font-family: var(--font-display); font-size: 64px; font-weight: 300;
  color: var(--cream); line-height: 1; margin-bottom: 4px; position: relative;
}
.points-label {
  font-size: 12px; color: var(--bone-dim); letter-spacing: 3px; text-transform: uppercase;
  position: relative;
}

/* Progress Bar */
.tier-progress { margin: 0 20px 24px; }
.progress-labels {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.progress-current { font-size: 12px; color: var(--bone-dim); }
.progress-next { font-size: 12px; color: var(--gold); font-weight: 500; }
.progress-track {
  height: 4px; border-radius: 2px; background: rgba(255,255,255,0.06);
  overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

/* QR Preview Card */
.qr-preview {
  margin: 0 20px 24px; padding: 24px;
  border-radius: 20px; text-align: center;
  background: var(--charcoal-light);
  border: 1px solid rgba(255,255,255,0.06);
  cursor: pointer; transition: all 0.2s;
}
.qr-preview:active { transform: scale(0.98); }
.qr-preview canvas { border-radius: 12px; }
.qr-preview-label {
  font-size: 12px; color: var(--bone-dim); margin-top: 12px;
  letter-spacing: 1px;
}
.qr-preview-label strong { color: var(--gold); font-weight: 500; }

/* History */
.history-section { padding: 0 20px 24px; }
.section-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: 2.5px;
  color: var(--bone-dim); margin-bottom: 14px;
}
.history-empty {
  text-align: center; padding: 32px 20px;
  color: var(--bone-dim); font-size: 13px; font-style: italic;
}
.history-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px; border-radius: 12px;
  background: var(--charcoal-light); margin-bottom: 8px;
  border: 1px solid rgba(255,255,255,0.03);
}
.history-desc { font-size: 14px; font-weight: 400; margin-bottom: 2px; }
.history-date { font-size: 11px; color: var(--bone-dim); }
.history-pts {
  font-size: 16px; font-weight: 600; white-space: nowrap;
}
.history-pts.positive { color: var(--green); }
.history-pts.negative { color: var(--red); }

/* === QR FULL SCREEN === */
.qr-full {
  align-items: center; justify-content: center; text-align: center;
  padding: 40px 24px;
  background: var(--charcoal);
  position: relative;
}
.qr-full::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 50% at 50% 40%, rgba(212,168,71,0.05) 0%, transparent 70%);
  pointer-events: none;
}
.qr-full-content { position: relative; z-index: 1; }
.qr-full-brand {
  font-family: var(--font-display); font-size: 24px; font-weight: 300;
  color: var(--cream); margin-bottom: 4px;
}
.qr-full-instruction {
  font-size: 13px; color: var(--bone-dim); margin-bottom: 32px;
}
.qr-full-frame {
  display: inline-block; padding: 24px;
  background: #ffffff; border-radius: 24px;
  margin-bottom: 24px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3), 0 0 80px rgba(212,168,71,0.08);
}
.qr-full-frame canvas { display: block; border-radius: 8px; }
.qr-full-name {
  font-family: var(--font-display); font-size: 22px; font-weight: 400;
  margin-bottom: 4px;
}
.qr-full-id {
  font-size: 11px; color: var(--bone-dim); letter-spacing: 2px;
  margin-bottom: 16px;
}
.qr-full-points {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 20px; border-radius: 20px;
  background: var(--gold-glow); border: 1px solid rgba(212,168,71,0.2);
}
.qr-full-points .pts-val {
  font-family: var(--font-display); font-size: 24px; font-weight: 400; color: var(--gold);
}
.qr-full-points .pts-lbl {
  font-size: 11px; color: var(--bone-dim); text-transform: uppercase; letter-spacing: 1px;
}

/* === PROFILE === */
.profile-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 24px; }
.profile-header {
  text-align: center; margin-bottom: 32px;
}
.profile-avatar {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--charcoal-light); border: 2px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 14px;
  font-family: var(--font-display); font-size: 28px; font-weight: 400; color: var(--gold);
}
.profile-header h2 {
  font-family: var(--font-display); font-size: 26px; font-weight: 400; margin-bottom: 4px;
}
.profile-header .profile-tier {
  font-size: 12px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase;
}

.profile-section {
  margin-bottom: 24px;
}
.profile-section-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: 2.5px;
  color: var(--bone-dim); margin-bottom: 12px;
}
.profile-field {
  padding: 16px; border-radius: 12px;
  background: var(--charcoal-light); margin-bottom: 8px;
  border: 1px solid rgba(255,255,255,0.04);
}
.profile-field-label {
  font-size: 11px; color: var(--bone-dim); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 4px;
}
.profile-field-value { font-size: 15px; font-weight: 400; }

.profile-edit-group { margin-bottom: 14px; }
.profile-edit-group label {
  display: block; font-size: 11px; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--bone-dim); margin-bottom: 6px;
}
.profile-edit-group input {
  width: 100%; padding: 13px 14px; border-radius: 10px;
  background: var(--charcoal-mid); border: 1px solid rgba(255,255,255,0.08);
  color: var(--cream); font-size: 15px; outline: none;
}
.profile-edit-group input:focus { border-color: var(--gold); }

.profile-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
.btn-edit {
  padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 600;
  background: var(--gold); color: var(--charcoal); width: 100%;
  transition: all 0.2s;
}
.btn-edit:active { transform: scale(0.97); }
.btn-cancel {
  padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 500;
  background: transparent; color: var(--bone); width: 100%;
  border: 1px solid rgba(255,255,255,0.1);
}
.btn-signout {
  padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 500;
  color: var(--red); width: 100%;
  border: 1px solid var(--red-glow);
  margin-top: 16px;
  transition: all 0.2s;
}
.btn-signout:active { background: var(--red-glow); }

/* === BOTTOM NAV === */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-height) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: var(--charcoal);
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; z-index: 50;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.bottom-nav.show { opacity: 1; pointer-events: auto; }
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  color: var(--bone-dim); transition: color 0.2s;
  padding: 8px 0;
}
.nav-item.active { color: var(--gold); }
.nav-item svg { width: 22px; height: 22px; }
.nav-item span { font-size: 10px; font-weight: 500; letter-spacing: 0.5px; }

/* === TOAST === */
.toast-container {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
  padding: 12px 24px; border-radius: 12px;
  background: var(--charcoal-light); color: var(--cream);
  font-size: 13px; border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  z-index: 200; transition: transform 0.3s ease;
  white-space: nowrap; max-width: 90%;
}
.toast-container.show { transform: translateX(-50%) translateY(0); }

/* === LOADING === */
.loading-spinner {
  display: inline-block; width: 20px; height: 20px;
  border: 2px solid rgba(255,255,255,0.15);
  border-top-color: var(--gold);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.screen-loading {
  position: fixed; inset: 0; z-index: 999;
  display: flex; align-items: center; justify-content: center;
  background: var(--charcoal);
  flex-direction: column; gap: 16px;
}
.screen-loading .brand {
  font-family: var(--font-display); font-size: 24px; font-weight: 300;
  color: var(--cream); opacity: 0.7;
}

/* === ANIMATIONS === */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.anim-fade-up {
  animation: fadeUp 0.5s ease forwards;
}
.anim-delay-1 { animation-delay: 0.08s; opacity: 0; }
.anim-delay-2 { animation-delay: 0.16s; opacity: 0; }
.anim-delay-3 { animation-delay: 0.24s; opacity: 0; }
.anim-delay-4 { animation-delay: 0.32s; opacity: 0; }
.anim-delay-5 { animation-delay: 0.40s; opacity: 0; }

/* Scrollbar */
::-webkit-scrollbar { width: 0; background: transparent; }
</style>
</head>
<body>

<!-- Loading -->
<div class="screen-loading" id="loadingScreen">
  <div class="brand">Terakawa</div>
  <div class="loading-spinner"></div>
</div>

<!-- Toast -->
<div class="toast-container" id="toast"></div>

<!-- Welcome Screen -->
<div class="screen" id="welcomeScreen">
  <div class="welcome">
    <div class="welcome-content">
      <div class="welcome-kanji anim-fade-up">寺川ラーメン</div>
      <div class="welcome-logo anim-fade-up anim-delay-1">Terakawa</div>
      <div class="welcome-sub anim-fade-up anim-delay-2">Ramen</div>
      <div class="welcome-tagline anim-fade-up anim-delay-3">Loyalty Rewards</div>
      <div class="welcome-divider anim-fade-up anim-delay-3"></div>
      <div class="welcome-buttons anim-fade-up anim-delay-4">
        <button class="btn-primary" onclick="showScreen('signinScreen')">Sign In</button>
        <button class="btn-secondary" onclick="showScreen('registerScreen')">Create Account</button>
      </div>
    </div>
  </div>
</div>

<!-- Sign In Screen -->
<div class="screen auth-screen" id="signinScreen">
  <button class="auth-back" onclick="showScreen('welcomeScreen')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    Back
  </button>
  <div class="auth-form">
    <div class="auth-header">
      <h1>Welcome Back</h1>
      <p>Sign in to view your rewards</p>
    </div>
    <div class="form-error" id="signinError"></div>
    <div class="toggle-method">
      <button class="active" onclick="setSigninMethod('phone',this)">Phone</button>
      <button onclick="setSigninMethod('email',this)">Email</button>
    </div>
    <div class="form-group">
      <label id="signinInputLabel">Phone Number</label>
      <input class="form-input" id="signinId" type="tel" placeholder="(xxx) xxx-xxxx">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input class="form-input" id="signinPass" type="password" placeholder="Enter password">
    </div>
    <button class="auth-submit" id="signinBtn" onclick="doSignin()">Sign In</button>
    <div class="auth-switch">
      Don't have an account? <a href="#" onclick="showScreen('registerScreen');return false">Create one</a>
    </div>
  </div>
</div>

<!-- Register Screen -->
<div class="screen auth-screen" id="registerScreen">
  <button class="auth-back" onclick="showScreen('welcomeScreen')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    Back
  </button>
  <div class="auth-form">
    <div class="auth-header">
      <h1>Join Terakawa</h1>
      <p>Start earning rewards with every bowl</p>
    </div>
    <div class="form-error" id="registerError"></div>
    <div class="toggle-method">
      <button class="active" onclick="setRegisterMethod('phone',this)">Phone</button>
      <button onclick="setRegisterMethod('email',this)">Email</button>
    </div>
    <div class="form-group">
      <label>Your Name</label>
      <input class="form-input" id="regName" type="text" placeholder="Full name">
    </div>
    <div class="form-group">
      <label id="regContactLabel">Phone Number</label>
      <input class="form-input" id="regContact" type="tel" placeholder="(xxx) xxx-xxxx">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input class="form-input" id="regPass" type="password" placeholder="Create a password (min 6 chars)">
    </div>
    <div class="form-group">
      <label>Birthday (Optional)</label>
      <div class="bday-row">
        <select id="regBdayMonth">
          <option value="">Month</option>
          <option value="1">January</option><option value="2">February</option>
          <option value="3">March</option><option value="4">April</option>
          <option value="5">May</option><option value="6">June</option>
          <option value="7">July</option><option value="8">August</option>
          <option value="9">September</option><option value="10">October</option>
          <option value="11">November</option><option value="12">December</option>
        </select>
        <select id="regBdayDay">
          <option value="">Day</option>
        </select>
      </div>
    </div>
    <button class="auth-submit" id="registerBtn" onclick="doRegister()">Create Account</button>
    <div class="auth-switch">
      Already a member? <a href="#" onclick="showScreen('signinScreen');return false">Sign in</a>
    </div>
  </div>
</div>

<!-- Dashboard Screen -->
<div class="screen with-nav" id="dashboardScreen">
  <div class="dash-scroll" id="dashScroll"></div>
</div>

<!-- QR Full Screen -->
<div class="screen with-nav" id="qrScreen">
  <div class="qr-full" id="qrFullContent"></div>
</div>

<!-- Profile Screen -->
<div class="screen with-nav" id="profileScreen">
  <div class="profile-scroll" id="profileContent"></div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav" id="bottomNav">
  <button class="nav-item active" data-tab="dashboardScreen" onclick="navTo('dashboardScreen',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    <span>Home</span>
  </button>
  <button class="nav-item" data-tab="qrScreen" onclick="navTo('qrScreen',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3"/><path d="M21 14h-3v3"/><path d="M18 21h3v-3"/></svg>
    <span>My QR</span>
  </button>
  <button class="nav-item" data-tab="profileScreen" onclick="navTo('profileScreen',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M5 20c0-3.5 3.1-6 7-6s7 2.5 7 6"/></svg>
    <span>Profile</span>
  </button>
</div>

<script>
// === FIREBASE INIT ===
const firebaseConfig = {
  apiKey: "AIzaSyAupCqnSQ1QNkg8uIYvuBf8rh0j-vl1QfY",
  authDomain: "terakawa-ucity.firebaseapp.com",
  projectId: "terakawa-ucity",
  storageBucket: "terakawa-ucity.firebasestorage.app",
  messagingSenderId: "607971307709",
  appId: "1:607971307709:web:965515a94433d72dc707d4"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// === CONSTANTS ===
const TIERS = [
  { name:'Bronze', min:0, max:99, cls:'tier-bronze' },
  { name:'Silver', min:100, max:299, cls:'tier-silver' },
  { name:'Gold',   min:300, max:599, cls:'tier-gold' },
  { name:'Platinum', min:600, max:Infinity, cls:'tier-platinum' }
];
const PHONE_DOMAIN = '@terakawa-loyalty.com';

let currentUser = null;
let memberData = null;
let signinMethod = 'phone';
let registerMethod = 'phone';
let isEditing = false;
let unsubscribe = null;

// === HELPERS ===
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function getTier(pts) {
  return TIERS.find(t => pts >= t.min && pts <= t.max) || TIERS[0];
}

function getNextTier(pts) {
  const idx = TIERS.findIndex(t => pts >= t.min && pts <= t.max);
  return idx < TIERS.length - 1 ? TIERS[idx + 1] : null;
}

function phoneToEmail(phone) {
  return phone.replace(/\D/g, '') + PHONE_DOMAIN;
}

function isPhone(str) {
  return /^\+?[\d\s\-\(\)]{7,}$/.test(str.trim());
}

function formatPhone(p) {
  if (!p) return '';
  const d = p.replace(/\D/g,'');
  if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
  if (d.length === 11) return `+${d[0]} (${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
  return p;
}

// === SCREEN NAV ===
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(id);
  if (target) target.classList.add('active');

  const authed = ['dashboardScreen','qrScreen','profileScreen'];
  const nav = document.getElementById('bottomNav');
  if (authed.includes(id)) {
    nav.classList.add('show');
  } else {
    nav.classList.remove('show');
  }
}

function navTo(screenId, btn) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  showScreen(screenId);
  if (screenId === 'dashboardScreen') renderDashboard();
  if (screenId === 'qrScreen') renderQRFull();
  if (screenId === 'profileScreen') renderProfile();
}

// === AUTH STATE ===
auth.onAuthStateChanged(async (user) => {
  const loader = document.getElementById('loadingScreen');
  if (user) {
    currentUser = user;
    // Listen to member data in real-time
    if (unsubscribe) unsubscribe();
    unsubscribe = db.collection('members').doc(user.uid).onSnapshot((doc) => {
      if (doc.exists) {
        memberData = { id: doc.id, ...doc.data() };
        loader.style.display = 'none';
        renderDashboard();
        renderQRFull();
        renderProfile();
        showScreen('dashboardScreen');
        // Set Home as active
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.querySelector('.nav-item[data-tab="dashboardScreen"]').classList.add('active');
      } else {
        // Doc doesn't exist yet (race condition), wait
        loader.style.display = 'none';
        toast('Setting up your account...');
      }
    }, (err) => {
      console.error('Snapshot error:', err);
      loader.style.display = 'none';
      showScreen('welcomeScreen');
    });
  } else {
    currentUser = null;
    memberData = null;
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    loader.style.display = 'none';
    showScreen('welcomeScreen');
  }
});

// === SIGN IN ===
function setSigninMethod(method, btn) {
  signinMethod = method;
  btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const input = document.getElementById('signinId');
  const label = document.getElementById('signinInputLabel');
  if (method === 'phone') {
    label.textContent = 'Phone Number';
    input.type = 'tel';
    input.placeholder = '(xxx) xxx-xxxx';
  } else {
    label.textContent = 'Email Address';
    input.type = 'email';
    input.placeholder = 'your@email.com';
  }
  input.value = '';
}

async function doSignin() {
  const id = document.getElementById('signinId').value.trim();
  const pass = document.getElementById('signinPass').value;
  const errEl = document.getElementById('signinError');
  errEl.classList.remove('show');

  if (!id || !pass) {
    errEl.textContent = 'Please fill in all fields';
    errEl.classList.add('show');
    return;
  }

  const btn = document.getElementById('signinBtn');
  btn.disabled = true; btn.textContent = 'Signing in...';

  try {
    let email = id;
    if (signinMethod === 'phone') {
      email = phoneToEmail(id);
    }
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    let msg = 'Invalid credentials. Please try again.';
    if (e.code === 'auth/user-not-found') msg = 'Account not found. Try creating one.';
    if (e.code === 'auth/wrong-password') msg = 'Incorrect password.';
    if (e.code === 'auth/invalid-email') msg = 'Invalid email format.';
    errEl.textContent = msg;
    errEl.classList.add('show');
  }
  btn.disabled = false; btn.textContent = 'Sign In';
}

// === REGISTER ===
function setRegisterMethod(method, btn) {
  registerMethod = method;
  btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const input = document.getElementById('regContact');
  const label = document.getElementById('regContactLabel');
  if (method === 'phone') {
    label.textContent = 'Phone Number';
    input.type = 'tel';
    input.placeholder = '(xxx) xxx-xxxx';
  } else {
    label.textContent = 'Email Address';
    input.type = 'email';
    input.placeholder = 'your@email.com';
  }
  input.value = '';
}

async function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const contact = document.getElementById('regContact').value.trim();
  const pass = document.getElementById('regPass').value;
  const bdayMonth = parseInt(document.getElementById('regBdayMonth').value) || null;
  const bdayDay = parseInt(document.getElementById('regBdayDay').value) || null;
  const errEl = document.getElementById('registerError');
  errEl.classList.remove('show');

  if (!name || !contact || !pass) {
    errEl.textContent = 'Please fill in name, contact, and password';
    errEl.classList.add('show');
    return;
  }
  if (pass.length < 6) {
    errEl.textContent = 'Password must be at least 6 characters';
    errEl.classList.add('show');
    return;
  }

  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.textContent = 'Creating account...';

  try {
    let email, phone;
    if (registerMethod === 'phone') {
      phone = contact;
      email = phoneToEmail(contact);
    } else {
      email = contact;
      phone = '';
    }

    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    const uid = cred.user.uid;

    await db.collection('members').doc(uid).set({
      name: name,
      email: registerMethod === 'email' ? email : '',
      phone: phone,
      points: 0,
      tier: 'Bronze',
      history: [],
      birthdayMonth: bdayMonth,
      birthdayDay: bdayDay,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      role: 'member'
    });

    toast('Welcome to Terakawa Rewards!');
  } catch(e) {
    let msg = 'Registration failed. Please try again.';
    if (e.code === 'auth/email-already-in-use') msg = 'This phone/email is already registered. Try signing in.';
    if (e.code === 'auth/weak-password') msg = 'Password is too weak. Use at least 6 characters.';
    if (e.code === 'auth/invalid-email') msg = 'Invalid email format.';
    errEl.textContent = msg;
    errEl.classList.add('show');
  }
  btn.disabled = false; btn.textContent = 'Create Account';
}

// Populate days
(function() {
  const sel = document.getElementById('regBdayDay');
  for (let i = 1; i <= 31; i++) {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = i;
    sel.appendChild(opt);
  }
})();

// === DASHBOARD ===
function renderDashboard() {
  if (!memberData) return;
  const m = memberData;
  const pts = m.points || 0;
  const tier = getTier(pts);
  const next = getNextTier(pts);
  const now = new Date();
  const isBday = m.birthdayMonth === (now.getMonth() + 1);

  let progressPct = 100;
  let progressLabel = '';
  if (next) {
    const range = next.min - tier.min;
    const current = pts - tier.min;
    progressPct = Math.min(100, Math.round((current / range) * 100));
    progressLabel = `${next.min - pts} pts to ${next.name}`;
  } else {
    progressLabel = 'Max tier reached';
  }

  const historyHTML = (m.history || []).slice(0, 15).map(h => `
    <div class="history-item">
      <div>
        <div class="history-desc">${h.desc || 'Points'}</div>
        <div class="history-date">${h.date || ''}</div>
      </div>
      <div class="history-pts ${h.pts >= 0 ? 'positive' : 'negative'}">${h.pts >= 0 ? '+' : ''}${h.pts}</div>
    </div>
  `).join('');

  document.getElementById('dashScroll').innerHTML = `
    <div class="dash-header anim-fade-up">
      <div>
        <div class="dash-greeting">Welcome back</div>
        <div class="dash-name">${m.name || 'Member'}</div>
      </div>
      ${isBday ? '<div class="dash-bday-badge">🎂 Happy Birthday!</div>' : ''}
    </div>

    <div class="points-hero anim-fade-up anim-delay-1">
      <div class="tier-label ${tier.cls}">${tier.name}</div>
      <div class="points-number">${pts}</div>
      <div class="points-label">Points</div>
    </div>

    <div class="tier-progress anim-fade-up anim-delay-2">
      <div class="progress-labels">
        <span class="progress-current">${tier.name}</span>
        <span class="progress-next">${progressLabel}</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${progressPct}%"></div>
      </div>
    </div>

    <div class="qr-preview anim-fade-up anim-delay-3" onclick="navTo('qrScreen',document.querySelector(\'[data-tab=qrScreen]\'))">
      <canvas id="dashQR"></canvas>
      <div class="qr-preview-label">Tap to show <strong>My QR Code</strong></div>
    </div>

    <div class="history-section anim-fade-up anim-delay-4">
      <div class="section-title">Points History</div>
      ${(m.history || []).length > 0 ? historyHTML : '<div class="history-empty">No transactions yet.<br>Visit us and start earning!</div>'}
    </div>
  `;

  // Generate small QR
  const dashCanvas = document.getElementById('dashQR');
  if (dashCanvas) {
    QRCode.toCanvas(dashCanvas, m.id, {
      width: 140,
      margin: 2,
      color: { dark: '#1a1a1a', light: '#ffffff' }
    });
  }
}

// === QR FULL SCREEN ===
function renderQRFull() {
  if (!memberData) return;
  const m = memberData;
  const pts = m.points || 0;
  const tier = getTier(pts);

  document.getElementById('qrFullContent').innerHTML = `
    <div class="qr-full-content">
      <div class="qr-full-brand anim-fade-up">Terakawa Ramen</div>
      <div class="qr-full-instruction anim-fade-up anim-delay-1">Show this code to staff when ordering</div>
      <div class="qr-full-frame anim-fade-up anim-delay-2">
        <canvas id="fullQR"></canvas>
      </div>
      <div class="qr-full-name anim-fade-up anim-delay-3">${m.name || 'Member'}</div>
      <div class="qr-full-id anim-fade-up anim-delay-3">${m.id.substring(0,8).toUpperCase()}</div>
      <div class="qr-full-points anim-fade-up anim-delay-4">
        <span class="pts-val">${pts}</span>
        <span class="pts-lbl">Points · ${tier.name}</span>
      </div>
    </div>
  `;

  const canvas = document.getElementById('fullQR');
  if (canvas) {
    QRCode.toCanvas(canvas, m.id, {
      width: 220,
      margin: 2,
      color: { dark: '#1a1a1a', light: '#ffffff' },
      errorCorrectionLevel: 'H'
    });
  }
}

// === PROFILE ===
function renderProfile() {
  if (!memberData) return;
  const m = memberData;
  const pts = m.points || 0;
  const tier = getTier(pts);
  const initial = (m.name || 'M').charAt(0).toUpperCase();

  const months = ['','January','February','March','April','May','June','July','August','September','October','November','December'];
  const bdayStr = m.birthdayMonth ? `${months[m.birthdayMonth]} ${m.birthdayDay || ''}` : 'Not set';

  if (isEditing) {
    renderProfileEdit();
    return;
  }

  document.getElementById('profileContent').innerHTML = `
    <div class="profile-header">
      <div class="profile-avatar">${initial}</div>
      <h2>${m.name || 'Member'}</h2>
      <div class="profile-tier">${tier.name} · ${pts} Points</div>
    </div>

    <div class="profile-section">
      <div class="profile-section-title">Account Info</div>
      <div class="profile-field">
        <div class="profile-field-label">Name</div>
        <div class="profile-field-value">${m.name || '—'}</div>
      </div>
      ${m.email ? `<div class="profile-field">
        <div class="profile-field-label">Email</div>
        <div class="profile-field-value">${m.email}</div>
      </div>` : ''}
      ${m.phone ? `<div class="profile-field">
        <div class="profile-field-label">Phone</div>
        <div class="profile-field-value">${formatPhone(m.phone)}</div>
      </div>` : ''}
      <div class="profile-field">
        <div class="profile-field-label">Birthday</div>
        <div class="profile-field-value">${bdayStr}</div>
      </div>
      <div class="profile-field">
        <div class="profile-field-label">Member Since</div>
        <div class="profile-field-value">${m.createdAt ? new Date(m.createdAt.seconds * 1000).toLocaleDateString('en-US', { year:'numeric', month:'long' }) : '—'}</div>
      </div>
    </div>

    <div class="profile-actions">
      <button class="btn-edit" onclick="startEditProfile()">Edit Profile</button>
      <button class="btn-signout" onclick="doSignout()">Sign Out</button>
    </div>
  `;
}

function startEditProfile() {
  isEditing = true;
  renderProfileEdit();
}

function renderProfileEdit() {
  if (!memberData) return;
  const m = memberData;

  document.getElementById('profileContent').innerHTML = `
    <div class="auth-header" style="margin-bottom:24px;">
      <h1>Edit Profile</h1>
    </div>

    <div class="form-error" id="profileError"></div>

    <div class="profile-edit-group">
      <label>Name</label>
      <input id="editName" type="text" value="${m.name || ''}">
    </div>
    <div class="profile-edit-group">
      <label>Phone</label>
      <input id="editPhone" type="tel" value="${m.phone || ''}" placeholder="(xxx) xxx-xxxx">
    </div>
    <div class="profile-edit-group">
      <label>Email</label>
      <input id="editEmail" type="email" value="${m.email || ''}" placeholder="your@email.com">
    </div>

    <div class="profile-actions" style="margin-top:20px;">
      <button class="btn-edit" onclick="saveProfile()">Save Changes</button>
      <button class="btn-cancel" onclick="cancelEditProfile()">Cancel</button>
    </div>
  `;
}

async function saveProfile() {
  const name = document.getElementById('editName').value.trim();
  const phone = document.getElementById('editPhone').value.trim();
  const email = document.getElementById('editEmail').value.trim();
  const errEl = document.getElementById('profileError');

  if (!name) {
    errEl.textContent = 'Name is required';
    errEl.classList.add('show');
    return;
  }

  try {
    await db.collection('members').doc(memberData.id).update({
      name: name,
      phone: phone,
      email: email
    });
    isEditing = false;
    toast('Profile updated');
  } catch(e) {
    errEl.textContent = 'Failed to update: ' + e.message;
    errEl.classList.add('show');
  }
}

function cancelEditProfile() {
  isEditing = false;
  renderProfile();
}

function doSignout() {
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  auth.signOut();
  isEditing = false;
}
</script>
</body>
</html>
